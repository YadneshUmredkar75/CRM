    container_name: crm-backend
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - MONGO_URI=mongodb+srv://yadneshumredkar7_db_user:gaszhNHH7DJ5F2pV@cluster0.je9ltxp.mongodb.net/dummycrm
